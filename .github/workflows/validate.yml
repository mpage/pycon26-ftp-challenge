name: Validate Submission

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: read
  pull-requests: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    outputs:
        pr_number: ${{ github.event.pull_request.number }}
        pr_url: ${{ github.event.pull_request.html_url  }}
        pr_author: ${{ github.event.pull_request.user.login }}

    steps:
      - name: Validate changed files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const expectedFile = `submissions/${prAuthor}.py`;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const changedFiles = files.map((f) => f.filename);

            if (changedFiles.length !== 1) {
              core.setFailed(
                `PR must modify exactly one file (${expectedFile}), but it modifies ${changedFiles.length}: ${changedFiles.join(", ")}`,
              );
              return;
            }

            if (changedFiles[0] !== expectedFile) {
              core.setFailed(
                `PR must only modify ${expectedFile}, but it modifies ${changedFiles[0]}`,
              );
              return;
            }

            core.info(`PR correctly modifies only ${expectedFile}`);
            core.exportVariable('PR_AUTHOR', prAuthor);
