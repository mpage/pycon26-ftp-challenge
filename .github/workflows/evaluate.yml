name: Evaluate Submission

on:
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to evaluate'
        required: true
        type: number

jobs:
  resolve_pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      pr_author: ${{ steps.resolve.outputs.pr_author }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      html_url: ${{ steps.resolve.outputs.html_url }}
    steps:
      - name: Resolve PR details
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            let pr;
            if (context.eventName === 'workflow_dispatch') {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: ${{ inputs.pr_number || 0 }},
              });
              pr = data;
            } else {
              pr = context.payload.pull_request;
            }
            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_author', pr.user.login);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('html_url', pr.html_url);

  validate_pr:
    needs: resolve_pr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Validate changed files
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = '${{ needs.resolve_pr.outputs.pr_author }}';
            const prNumber = ${{ needs.resolve_pr.outputs.pr_number }};
            const expectedFile = `submissions/${prAuthor}.py`;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const changedFiles = files.map((f) => f.filename);

            if (changedFiles.length !== 1) {
              core.setFailed(
                `PR must modify exactly one file (${expectedFile}), but it modifies ${changedFiles.length}: ${changedFiles.join(", ")}`,
              );
              return;
            }

            if (changedFiles[0] !== expectedFile) {
              core.setFailed(
                `PR must only modify ${expectedFile}, but it modifies ${changedFiles[0]}`,
              );
              return;
            }

            core.info(`PR correctly modifies only ${expectedFile}`);

  run_harness:
    needs: [resolve_pr, validate_pr]
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_pr.outputs.head_sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Precompile Python files
        run: |
          uv run --python 3.14.3t python -m compileall challenge/ submissions/

      - name: Save PR metadata
        run: |
          mkdir -p ${{ runner.temp }}/eval-results
          cat <<'OUTER' > ${{ runner.temp }}/eval-results/pr_metadata.json
          {
            "pr_number": ${{ needs.resolve_pr.outputs.pr_number }},
            "pr_author": "${{ needs.resolve_pr.outputs.pr_author }}",
            "head_sha": "${{ needs.resolve_pr.outputs.head_sha }}",
            "html_url": "${{ needs.resolve_pr.outputs.html_url }}"
          }
          OUTER

      - name: Run Harness
        timeout-minutes: 10
        run: |
          set -o errexit
          set -o pipefail
          uv run --python 3.14.3t challenge/harness.py --num-trials 3 --json submissions/${{ needs.resolve_pr.outputs.pr_author }}.py graphs | tee ${{ runner.temp }}/eval-results/results.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: ${{ runner.temp }}/eval-results/
