name: Benchmark & Leaderboard

on:
  pull_request:
    paths:
      - "submissions/**"
  push:
    branches:
      - main
    paths:
      - "submissions/**"

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: benchmark-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  score:
    runs-on: ubuntu-latest
    outputs:
      username: ${{ steps.detect.outputs.username }}
      speedup: ${{ steps.run_harness.outputs.speedup }}
      status: ${{ steps.run_harness.outputs.status }}
      pr_number: ${{ steps.pr_info.outputs.pr_number }}
      pr_url: ${{ steps.pr_info.outputs.pr_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed submission
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
              base="$(git rev-parse "${head}^" 2>/dev/null || true)"
            fi
          fi

          mapfile -t changed < <(git diff --name-only "$base" "$head" -- 'submissions/*.py' | grep -v '^submissions/_' | sort -u)

          if [[ "${#changed[@]}" -eq 0 ]]; then
            echo "No submission files changed." >&2
            exit 1
          fi

          submission="${changed[0]}"
          username="$(basename "$submission" .py)"

          echo "submission=$submission" >> "$GITHUB_OUTPUT"
          echo "username=$username" >> "$GITHUB_OUTPUT"

          echo "### Submission detected" >> "$GITHUB_STEP_SUMMARY"
          echo "- File: \`$submission\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Username: $username" >> "$GITHUB_STEP_SUMMARY"

      - name: Install free-threaded Python 3.13t
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3.13-nogil || sudo apt-get install -y -qq python3.13t

          # Make python3.13t the default python3
          PY_PATH="$(command -v python3.13t 2>/dev/null || command -v python3.13-nogil 2>/dev/null || echo "")"
          if [[ -z "$PY_PATH" ]]; then
            echo "::error::Could not find free-threaded Python 3.13"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/py-bin"
          ln -sf "$PY_PATH" "$RUNNER_TEMP/py-bin/python3"
          ln -sf "$PY_PATH" "$RUNNER_TEMP/py-bin/python"
          echo "$RUNNER_TEMP/py-bin" >> "$GITHUB_PATH"

      - name: Run scoring harness
        id: run_harness
        shell: bash
        env:
          SUBMISSION: ${{ steps.detect.outputs.submission }}
          USERNAME: ${{ steps.detect.outputs.username }}
        run: |
          set -euo pipefail

          score_file="$RUNNER_TEMP/score.json"

          # Run the scoring wrapper (exits non-zero on validation failure but
          # still produces valid JSON output)
          python3 score.py "$SUBMISSION" graphs/ --runs 3 > "$score_file" 2>"$RUNNER_TEMP/score.stderr" || true

          if [[ ! -s "$score_file" ]]; then
            # Harness crashed before producing output
            stderr="$(cat "$RUNNER_TEMP/score.stderr" 2>/dev/null || echo "Unknown error")"
            echo "{\"status\":\"dnf\",\"speedup\":0.0,\"error\":\"$stderr\"}" > "$score_file"
          fi

          status="$(python3 -c "import json; d=json.load(open('$score_file')); print(d.get('status','dnf'))")"
          speedup="$(python3 -c "import json; d=json.load(open('$score_file')); print(d.get('speedup', 0.0))")"

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "speedup=$speedup" >> "$GITHUB_OUTPUT"
          echo "score_file=$score_file" >> "$GITHUB_OUTPUT"

          echo "### Score" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: $status" >> "$GITHUB_STEP_SUMMARY"
          echo "- Speedup: ${speedup}x" >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve PR info
        id: pr_info
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const resp = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const pr = (resp.data || []).find(p => p.merged_at) || resp.data?.[0];
            core.setOutput("pr_number", pr ? String(pr.number) : "");
            core.setOutput("pr_url", pr?.html_url || "");

      - name: Post score comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SCORE_FILE: ${{ steps.run_harness.outputs.score_file }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const marker = "<!-- pycon26-ft-score -->";
            const score = JSON.parse(fs.readFileSync(process.env.SCORE_FILE, "utf8"));
            const passed = score.status === "valid";
            const title = passed ? "## ✅ Benchmark Result" : "## ❌ Benchmark Result: DNF";

            const lines = [
              marker,
              title,
              "",
              `| Metric | Value |`,
              `| ------ | ----- |`,
              `| **Speedup** | ${score.speedup}x |`,
              `| **Status** | ${score.status} |`,
              `| **Graphs** | ${(score.results || []).length} |`,
            ];

            if (score.results && score.results.length > 0) {
              lines.push("", "### Per-graph results", "");
              lines.push("| Graph | Speedup | Status |");
              lines.push("| ----- | ------: | :----: |");
              for (const r of score.results) {
                const s = r.passed ? "✅" : "❌";
                lines.push(`| ${r.graph} | ${r.speedup}x | ${s} |`);
              }
            }

            if (score.error) {
              lines.push("", `**Error:** ${score.error}`);
            }

            const body = lines.join("\n");
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(c =>
              c.user?.type === "Bot" && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

  update-leaderboard:
    needs: score
    if: github.event_name == 'push' && needs.score.outputs.status == 'valid'
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.push_score.outputs.succeeded }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update leaderboard JSON
        id: push_score
        shell: bash
        env:
          USERNAME: ${{ needs.score.outputs.username }}
          SPEEDUP: ${{ needs.score.outputs.speedup }}
          STATUS: ${{ needs.score.outputs.status }}
          PR_NUMBER: ${{ needs.score.outputs.pr_number }}
          PR_URL: ${{ needs.score.outputs.pr_url }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          success=false

          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          leaderboard_path = Path("scores/leaderboard.json")
          username = os.environ["USERNAME"]
          speedup_raw = os.environ["SPEEDUP"]
          status = os.environ["STATUS"]
          pr_number = os.environ.get("PR_NUMBER", "")
          pr_url = os.environ.get("PR_URL", "")

          speedup_value = float(speedup_raw)
          now = datetime.now(timezone.utc).isoformat()

          entry = {
              "username": username,
              "display_name": username,
              "pr_number": int(pr_number) if pr_number else None,
              "pr_url": pr_url or "",
              "merged_at": now,
              "speedup": f"{speedup_value:.2f}",
              "status": status,
          }

          if leaderboard_path.exists():
              leaderboard = json.loads(leaderboard_path.read_text(encoding="utf-8"))
          else:
              leaderboard = {"last_updated": "", "entries": []}

          entries = leaderboard.get("entries", [])
          if not isinstance(entries, list):
              entries = []

          replaced = False
          for index, existing in enumerate(entries):
              if existing.get("username") == username:
                  existing_speedup = float(existing.get("speedup") or "0")
                  if speedup_value > existing_speedup:
                      entries[index] = entry
                  replaced = True
                  break
          if not replaced:
              entries.append(entry)

          valid = [e for e in entries if e.get("status") == "valid" and e.get("speedup")]
          valid.sort(key=lambda e: float(e["speedup"]), reverse=True)
          invalid = [e for e in entries if e.get("status") != "valid" or not e.get("speedup")]

          payload = {
              "last_updated": now,
              "entries": valid + invalid,
          }

          leaderboard_path.parent.mkdir(parents=True, exist_ok=True)
          leaderboard_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

            if git diff --quiet -- scores/leaderboard.json; then
              echo "No changes to leaderboard."
              success=true
              break
            fi

            git add scores/leaderboard.json
            if ! git commit -m "Update leaderboard: ${USERNAME} (${SPEEDUP}x)"; then
              sleep 5
              continue
            fi

            if git pull --rebase origin main; then
              if git push origin HEAD:main; then
                success=true
                break
              fi
            fi

            git rebase --abort || true
            sleep 5
          done

          echo "succeeded=$success" >> "$GITHUB_OUTPUT"

          if [[ "$success" != "true" ]]; then
            echo "::error::Failed to push leaderboard update after 3 attempts."
            exit 1
          fi

  deploy-pages:
    runs-on: ubuntu-latest
    needs: update-leaderboard
    if: needs.update-leaderboard.outputs.pages_ready == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/pages"
          cp -R leaderboard "$RUNNER_TEMP/pages/leaderboard"
          mkdir -p "$RUNNER_TEMP/pages/scores"
          cp scores/leaderboard.json "$RUNNER_TEMP/pages/scores/leaderboard.json"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/pages

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
